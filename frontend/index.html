<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy ERP - Login</title>
    <link rel="stylesheet" href="/src/css/global.css">
</head>
<body>
    <div class="login-container">
        <h1>Academy ERP</h1>
        <p>DIT University Secure Portal</p>
        
        <form id="login-form">
            <div class="form-group">
                <label for="portalId">Portal ID</label>
                <input type="text" id="portalId" placeholder="e.g., ADM-0001 or STU-1234" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" id="login-btn">Sign In</button>
            
            <div id="error-message" style="color: red; margin-top: 10px; display: none;"></div>
        </form>
    </div>

    <script type="module" src="/src/pages/login.js"></script>
</body>
</html>
